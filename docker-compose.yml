services:
  tooling-suite:
    build: .
    ports:
      - "8080:80"       # only this is reachable from outside
    networks:
      - internal
    depends_on:
      - device-tracking-api
      - devicesurvey-device-survey-1

  device-tracking-api:
    image: device-tracking-api:latest
    # no ports: block — not reachable from outside Docker
    networks:
      - internal

  devicesurvey-device-survey-1:
    image: devicesurvey:latest
    # no ports: block — not reachable from outside Docker
    networks:
      - internal

networks:
  internal:
    driver: bridge
