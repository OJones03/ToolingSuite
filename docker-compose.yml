services:
  tooling-suite:
    build: .
    ports:
      - "8080:80"       # Only this container is reachable from outside
    networks:
      - internal

  device-tracking-api:
    image: device-tracking-api   # replace with your actual image
    # No 'ports:' — not reachable from outside Docker
    networks:
      - internal

  devicesurvey-device-survey-1:
    image: device-survey          # replace with your actual image
    # No 'ports:' — not reachable from outside Docker
    networks:
      - internal

networks:
  internal:
    driver: bridge
